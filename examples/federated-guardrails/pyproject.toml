[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "federated-guardrails"
version = "1.0.0"
description = "Federated LLM Guardrails Benchmarking across regulated domains"
license = "Apache-2.0"
dependencies = [
    "flwr[simulation]>=1.15.0",
    "numpy>=1.26.0",
]

[tool.hatch.build.targets.wheel]
packages = ["."]

[tool.flwr.app]
publisher = "aishwarya"

[tool.flwr.app.components]
serverapp = "fedguardrails.server_app:app"
clientapp = "fedguardrails.client_app:app"

[tool.flwr.app.config]
num-server-rounds = 1


