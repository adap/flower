schema_version: "1.0"
mode: deployment
domains:
  - downstream_rxmer
  - upstream_return
seed: 42

federation:
  num_clients: 2
  num_rounds: 1
  fraction_train: 1.0
  fraction_evaluate: 1.0
  min_train_nodes: 2
  min_evaluate_nodes: 2

local_training:
  local_epochs: 1
  batch_size: 64
  lr: 0.001
  weight_decay: 0.0001

data:
  samples_per_client_train: 240
  samples_per_client_val: 80
  samples_per_client_test: 80

non_iid:
  global: 0.4
  class_skew: null
  regime_skew: null
  context_skew: null
  template_skew: null

unknown_gate:
  enabled: true
  threshold_grid_size: 201
  unknown_class_index: 6

artifacts:
  root_dir: artifacts/fl
  run_name: deploy_local_smoke

deployment:
  launch_mode: managed_local
  connection_name: comcast-local
  run_timeout_sec: 900
  poll_interval_sec: 2.0
  startup_timeout_sec: 20
  shutdown_grace_sec: 5
  local_num_supernodes: null
  local_insecure: true
  local_database: ":flwr-in-memory:"
  local_runtime_dir: null
  superlink: null
  federation: null
  stream_logs: false
