[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "fedhomo"
version = "1.0.0"
description = "Federated Learning with Homomorphic Encryption (CKKS via TenSEAL)"
license = "Apache-2.0"
dependencies = [
    "flwr[simulation]>=1.17.0",
    "flwr-datasets[vision]>=0.5.0",
    "torch>=2.0.0",
    "torchvision>=0.15.0",
    "tenseal>=0.3.14",
    "numpy>=1.24.0",
]

[project.optional-dependencies]
dev = [
    "black==24.2.0",
    "isort==5.13.2",
    "ruff==0.1.9",
    "mypy==1.8.0",
    "pytest==6.2.4",
]

[tool.hatch.build.targets.wheel]
packages = ["."]

[tool.hatch.metadata]
allow-direct-references = true

# ── Flower App ────────────────────────────────────────────────────────────────

[tool.flwr.app]
publisher = "alecatalfamo"

[tool.flwr.app.components]
serverapp = "fedhomo.server_app:app"
clientapp = "fedhomo.client_app:app"

[tool.flwr.app.config]
num-supernodes = 3

num-server-rounds = 3
fraction-fit = 0.5
local-epochs = 1
dataset = "mnist"           # "mnist" or "cifar10"

