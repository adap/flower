# # # ── Linting & formatting ──────────────────────────────────────────────────────

[tool.isort]
profile = "black"
known_first_party = ["flwr"]

[tool.black]
line-length = 88
target-version = ["py38", "py39", "py310", "py311"]

[tool.ruff]
target-version = "py38"
line-length = 88
select = ["D", "E", "F", "W", "B", "ISC", "C4"]
fixable = ["D", "E", "F", "W", "B", "ISC", "C4"]
ignore = ["B024", "B027"]
exclude = [".git", ".venv", "__pypackages__", "build", "dist"]

[tool.ruff.pydocstyle]
convention = "numpy"

[tool.mypy]
ignore_missing_imports = true
strict = false
plugins = "numpy.typing.mypy_plugin"

[[tool.mypy.overrides]]
module = "torch.*"
follow_imports = "skip"

[tool.pytest.ini_options]
minversion = "6.2"
addopts = "-qq"
testpaths = ["fedhomo"]

[tool.pylint."MESSAGES CONTROL"]
disable = "duplicate-code,too-few-public-methods,useless-import-alias"
good-names = "i,j,k,_,x,y,X,Y"
max-args = 10
max-attributes = 15
max-locals = 36
max-branches = 20
max-statements = 55
