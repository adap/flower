[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "federated-fraud-detection"
version = "1.0.0"
description = "Federated Financial Fraud Detection with XGBoost and Flower"
license = "Apache-2.0"
dependencies = [
    "flwr[simulation]>=1.26.1",
    "xgboost>=2.0.0",
    "scikit-learn>=1.3.0",
    "pandas>=2.0.0",
    "numpy>=1.24.0",
]

[tool.hatch.build.targets.wheel]
packages = ["."]

[tool.flwr.app]
publisher = "frauddetection"

[tool.flwr.app.components]
serverapp = "frauddetection.server_app:app"
clientapp = "frauddetection.client_app:app"

[tool.flwr.app.config]
# Federation settings
num-server-rounds = 3
fraction-evaluate = 1.0

# Local XGBoost training: number of boosting rounds per client per FL round
local-epochs = 50

# Path to the Ethereum transaction CSV (relative to the working directory).
# Simulation mode: all virtual clients share this file; it is partitioned on
#   the fly by partition-id / num-partitions from node_config.
# Deployment mode: override this with the data-path key in each node's
#   node_config instead (client will use node_config["data-path"]).
data-csv = "data/preprocessed_Ethereum_cleaned_v2.csv"

[tool.flwr.federations.local-simulation]
options.num-supernodes = 5
