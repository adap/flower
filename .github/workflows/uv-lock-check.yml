name: UV Lock Check

on:
  push:
    branches:
      - main
    paths:
      - "**/pyproject.toml"
      - "**/uv.lock"
      - ".github/workflows/uv-lock-check.yml"
  pull_request:
    branches:
      - main
    paths:
      - "**/pyproject.toml"
      - "**/uv.lock"
      - ".github/workflows/uv-lock-check.yml"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref == 'refs/heads/main' && github.run_id || github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  UV_NO_MANAGED_PYTHON: 1
  UV_PYTHON_DOWNLOADS: never

jobs:
  check-uv-lock:
    runs-on: ubuntu-22.04
    strategy:
      fail-fast: false
      matrix:
        project:
          - dev
          - datasets
          - framework

    name: Check ${{ matrix.project }} / uv.lock

    steps:
      - uses: actions/checkout@v5
      - name: Bootstrap
        uses: ./.github/actions/bootstrap
        with:
          uv-skip: "false"
          poetry-skip: "true"
      - name: Verify lockfile is up-to-date
        run: uv lock --check --project ${{ matrix.project }}
